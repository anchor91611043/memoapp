<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Notion風メモ（階層構造版）</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .page-link { color: #007bff; cursor: pointer; text-decoration: underline; margin-bottom: 5px; }
        textarea { width: 100%; height: 200px; display: block; margin: 10px 0; }
        .nav { margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="nav" class="nav"></div>
    <div id="app">
        <h1 id="page-title">ホーム</h1>
        <textarea id="text-area" oninput="saveCurrentPage()"></textarea>
        <div id="children-list"></div>
        <hr>
        <button onclick="addPage()">ページ追加</button>
        <button onclick="goBack()">戻る</button>
    </div>

    <script>
        // データ構造の初期化
        let db = JSON.parse(localStorage.getItem('myNotion')) || { title: 'ホーム', text: '', children: [] };
        let currentPath = [db]; // ページの階層を管理する配列

        function render() {
            const currentPage = currentPath[currentPath.length - 1];
            document.getElementById('page-title').innerText = currentPage.title;
            document.getElementById('text-area').value = currentPage.text || '';
            
            const list = document.getElementById('children-list');
            list.innerHTML = '<h3>子ページ:</h3>';
            currentPage.children.forEach((child, index) => {
                const div = document.createElement('div');
                div.className = 'page-link';
                div.innerText = child.title;
                div.onclick = () => { currentPath.push(child); render(); };
                list.appendChild(div);
            });
            document.getElementById('nav').innerText = currentPath.map(p => p.title).join(' > ');
        }

        function saveCurrentPage() {
            currentPath[currentPath.length - 1].text = document.getElementById('text-area').value;
            localStorage.setItem('myNotion', JSON.stringify(db));
        }

        function addPage() {
            const title = prompt("ページ名を入力:");
            if(title) {
                currentPath[currentPath.length - 1].children.push({ title, text: '', children: [] });
                saveCurrentPage();
                render();
            }
        }

        function goBack() {
            if (currentPath.length > 1) {
                currentPath.pop();
                render();
            }
        }

        render();
    </script>
</body>
</html>
