<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>メモ帳</title>
    <style>
        textarea { width: 100%; height: 90vh; font-size: 16px; padding: 10px; box-sizing: border-box; }
    </style>
</head>
<body>
    <textarea id="memo" placeholder="ここに文字を打つ..."></textarea>

    <script>
        const memo = document.getElementById('memo');
        // 保存された内容を読み込む
        memo.value = localStorage.getItem('myMemo') || '';
        // 入力するたびに自動保存
        memo.addEventListener('input', () => {
            localStorage.setItem('myMemo', memo.value);
        });
    </script>
</body>
</html>
