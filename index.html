<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>マークダウンメモ</title>
    <!-- マークダウン変換用のライブラリを読み込み -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; display: flex; gap: 20px; }
        #editor-area { flex: 1; height: 80vh; }
        #preview-area { flex: 1; border: 1px solid #ccc; padding: 10px; background: #f9f9f9; }
        textarea { width: 100%; height: 100%; }
        .page-link { color: blue; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>
    <div id="editor-area">
        <h1 id="page-title">ホーム</h1>
        <textarea id="text-area" oninput="saveAndPreview()"></textarea>
    </div>
    <div id="preview-area">
        <h3>プレビュー</h3>
        <div id="rendered-content"></div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('myNotion')) || { title: 'ホーム', text: '', children: [] };
        let currentPath = [db];

        function saveAndPreview() {
            const text = document.getElementById('text-area').value;
            currentPath[currentPath.length - 1].text = text;
            localStorage.setItem('myNotion', JSON.stringify(db));
            
            // マークダウンをHTMLに変換して表示！
            document.getElementById('rendered-content').innerHTML = marked.parse(text);
        }

        function render() {
            const currentPage = currentPath[currentPath.length - 1];
            document.getElementById('page-title').innerText = currentPage.title;
            document.getElementById('text-area').value = currentPage.text || '';
            saveAndPreview(); // 初期表示時にプレビューも更新
        }

        render();
    </script>
</body>
</html>
